    <style>
        :root { --glass-bg: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.1); }
        
        /* Ajuste do Body para não dar scroll e organizar tudo certinho */
        body { 
            background: #0f172a; color: white; 
            height: 100dvh; /* Altura exata da tela do celular */
            overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .syne { font-family: 'Syne', sans-serif; }
        
        /* Nova classe para os números usando Arial/Fontes Padrão redondas */
        .fonte-numeros { font-family: Arial, Helvetica, sans-serif; font-weight: bold; letter-spacing: -2px; }

        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pulse-glow { animation: pulseGlow 4s ease-in-out infinite; }
        @keyframes pulseGlow { 0%, 100% { text-shadow: 0 0 40px rgba(79, 70, 229, 0.4); } 50% { text-shadow: 0 0 70px rgba(79, 70, 229, 0.8), 0 0 20px rgba(255, 255, 255, 0.2); } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; display: inline-block; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stat-card { transition: transform 0.3s ease, border-color 0.3s ease; }
        .stat-card:active { transform: scale(0.95); }
    </style>
</head>

    <main id="app-content" class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl z-10 mx-auto hidden opacity-0 transition-opacity duration-500 min-h-0 py-4">

        </div>

    <script>
        (function() {
            const canvas = document.getElementById('shader-canvas');
            function syncSize() {
                const w = canvas.clientWidth || window.innerWidth;
                const h = canvas.clientHeight || window.innerHeight;
                if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
            }
            window.addEventListener('resize', syncSize); syncSize();
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return;
            const vs = `attribute vec2 a_position; varying vec2 v_texCoord; void main() { v_texCoord = a_position * 0.5 + 0.5; gl_Position = vec4(a_position, 0.0, 1.0); }`;
            const fs = `precision highp float; varying vec2 v_texCoord; uniform float u_time; void main() { vec2 uv = v_texCoord; float noise = sin(uv.x * 10.0 + u_time * 0.5) * 0.1; noise += sin(uv.y * 8.0 - u_time * 0.3) * 0.1; vec3 color1 = vec3(0.059, 0.09, 0.165); vec3 color2 = vec3(0.118, 0.161, 0.231); vec3 accent = vec3(0.31, 0.275, 0.898); vec3 color = mix(color1, color2, uv.y + noise); color = mix(color, accent, (sin(u_time * 0.2) * 0.5 + 0.5) * 0.05); float vignette = 1.0 - length(uv - 0.5) * 0.5; gl_FragColor = vec4(color * vignette, 1.0); }`;
            function cs(type, src) { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
            const prog = gl.createProgram(); gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs)); gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs)); gl.linkProgram(prog); gl.useProgram(prog);
            const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf); gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
            const pos = gl.getAttribLocation(prog, 'a_position'); gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
            const uTime = gl.getUniformLocation(prog, 'u_time');
            function render(t) { gl.viewport(0, 0, canvas.width, canvas.height); if (uTime) gl.uniform1f(uTime, t * 0.001); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); requestAnimationFrame(render); }
            render(0);
        })();
    </script>

        let isEncerrado = false;
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('pt-BR');
            const h = now.getHours(), m = now.getMinutes();
            isEncerrado = (h > 16 || (h === 16 && m >= 39));

            if (isEncerrado) {
                document.getElementById('total-presentes').innerText = "0";
                document.getElementById('cozinha-alerta').classList.remove('hidden');
                document.getElementById('stats-grid').style.opacity = "0.5";
            } else {
                document.getElementById('cozinha-alerta').classList.add('hidden');
                document.getElementById('stats-grid').style.opacity = "1";
            }
        }
        setInterval(updateClock, 1000); updateClock();

        function iniciarLeituraFirebase(user) {
            if (!user) return;
            
            let refRegistos = isPreview ? collection(db, 'artifacts', appId, 'public', 'data', 'registos_acesso') : collection(db, "registos_acesso");
            
            onSnapshot(refRegistos, (snapshot) => {
                let presentesStatus = {}, contagemEntradas = 0, contagemSaidas = 0;

                snapshot.forEach(doc => {
                    let log = doc.data();
                    if(log.tipo === 'entrada') { presentesStatus[log.idAluno] = true; contagemEntradas++; }
                    else if (log.tipo === 'saida') { presentesStatus[log.idAluno] = false; contagemSaidas++; }
                });

                let alunosPresentes = Object.values(presentesStatus).filter(status => status === true).length;

                if(!isEncerrado) animarNumero('total-presentes', alunosPresentes);
                animarNumero('total-entradas', contagemEntradas);
                animarNumero('total-saidas', contagemSaidas);
            }, (error) => {
                console.error("Erro no Firebase:", error);
            });
        }

        function animarNumero(id, novoValor) {
            const el = document.getElementById(id);
            let valorAtual = parseInt(el.innerText) || 0; 
            if(valorAtual !== novoValor) {
                el.innerText = novoValor;
                el.style.transform = 'scale(1.1)';
                setTimeout(() => el.style.transform = 'scale(1)', 200);
            }
        }
    </script>
