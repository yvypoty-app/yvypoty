        const isPreview = typeof __firebase_config !== 'undefined';
        if (isPreview) {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        if (isPreview) {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
        }

        function redirecionarPorPerfil(email) {
            if (isPreview) return; // Bloqueia o erro de URL no ambiente de testes

            const emailMin = email.toLowerCase();
            if (emailMin.includes('zelador')) {
                window.location.href = 'zelador.html';
            } else if (emailMin.includes('cozinha')) {
                window.location.href = 'cozinha.html';
            } else {
                window.location.href = 'admin.html';
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user && user.email) {
                redirecionarPorPerfil(user.email);
            }
        });

        window.handleLogin = function() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            const btn = document.getElementById('btn-entrar');

            if (!email || !pass) {
                mostrarErro("Preencha o e-mail e a senha.");
                return;
            }

            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Autenticando...`;
            btn.classList.add('opacity-80', 'pointer-events-none');

            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    if (isPreview) {
                        btn.innerHTML = `Entrou (Modo Preview)`;
                        btn.classList.remove('opacity-80', 'pointer-events-none');
                    }
                })
                .catch(() => {
                    btn.innerHTML = `Entrar no Sistema`;
                    btn.classList.remove('opacity-80', 'pointer-events-none');
                    mostrarErro("E-mail ou senha incorretos.");
                });
        }

        function mostrarErro(mensagem) {
            const toast = document.getElementById('toast-container');
            document.getElementById('toast-msg').innerText = mensagem;
            toast.classList.remove('-translate-y-[150%]');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('-translate-y-[150%]');
            }, 4000);
        }
