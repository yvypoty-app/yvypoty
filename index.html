<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Yvy Poty | Portal de Acesso</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#464554", "surface-container-lowest": "#060e20", "on-surface-variant": "#c7c4d7",
                        "outline": "#908fa0", "tertiary": "#ffb95f", "on-secondary": "#003824", "on-secondary-container": "#00311f",
                        "text-muted": "#94a3b8", "text-main": "#f8fafc", "on-surface": "#dae2fd", "error-container": "#93000a",
                        "surface-bright": "#2d3449", "surface-tint": "#c0c1ff", "primary-fixed-dim": "#c0c1ff",
                        "secondary-fixed": "#6ffbbe", "on-error": "#690005", "secondary-fixed-dim": "#4edea3",
                        "on-background": "#dae2fd", "inverse-on-surface": "#283044", "on-error-container": "#ffdad6",
                        "surface-container-highest": "#2d3449", "on-primary-fixed": "#07006c", "primary-container": "#8083ff",
                        "on-secondary-fixed": "#002113", "secondary": "#4edea3", "tertiary-fixed": "#ffddb8",
                        "background": "#0b1326", "inverse-primary": "#494bd6", "surface": "#1e293b", "error": "#ffb4ab",
                        "on-primary-container": "#0d0096", "surface-variant": "#2d3449", "danger": "#ef4444",
                        "border": "#334155", "surface-container-high": "#222a3d", "inverse-surface": "#dae2fd",
                        "tertiary-container": "#ca8100", "secondary-container": "#00a572", "surface-container-low": "#131b2e",
                        "surface-container": "#171f33", "primary": "#c0c1ff"
                    },
                    borderRadius: { "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem" },
                    fontFamily: { "body-lg": ["DM Sans"], "headline-lg": ["Syne"], "label-sm": ["DM Sans"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        body { min-height: 100dvh; background: #0b1326; background-image: radial-gradient(at 0% 0%, rgba(128, 131, 255, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(78, 222, 163, 0.1) 0px, transparent 50%);}
    </style>
</head>
<body class="bg-background text-on-background font-body-lg overflow-x-hidden min-h-screen relative">

    <div class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-6" id="auth-screen">
        <div class="relative z-10 w-full max-w-sm glass-card rounded-3xl p-8 flex flex-col items-center gap-6 shadow-[0_10px_40px_rgba(0,0,0,0.5)]">
            <div class="w-20 h-20 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mb-2">
                <span class="material-symbols-outlined text-4xl text-on-primary-container">domain</span>
            </div>
            <div class="text-center">
                <h1 class="font-headline-lg text-4xl text-primary mb-1 tracking-tight">Yvy Poty</h1>
                <p class="text-on-surface-variant font-bold tracking-wider uppercase text-xs">Portal de Acesso Único</p>
            </div>
            <div class="w-full space-y-4 mt-4">
                <div class="space-y-2">
                    <label class="font-label-sm text-on-surface-variant px-1">E-mail Operacional</label>
                    <input class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="login-email" placeholder="nome@yvypoty.com" type="email"/>
                </div>
                <div class="space-y-2">
                    <label class="font-label-sm text-on-surface-variant px-1">Senha</label>
                    <input class="w-full bg-surface-container-low border border-outline-variant rounded-xl px-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="login-password" placeholder="••••••••" type="password" onkeypress="if(event.key === 'Enter') handleLogin()"/>
                </div>
                <button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all mt-4 flex items-center justify-center gap-2" id="btn-entrar" onclick="handleLogin()">
                    Entrar no Sistema
                </button>
            </div>
        </div>
    </div>

    <div class="fixed top-10 left-1/2 -translate-x-1/2 z-[200] w-[calc(100%-40px)] max-w-sm pointer-events-none transition-transform duration-500 -translate-y-[150%]" id="toast-container">
        <div class="glass-card px-6 py-4 rounded-2xl border-l-4 border-error flex items-center gap-4 shadow-2xl bg-surface-container-highest">
            <div class="w-10 h-10 rounded-full bg-error/20 flex items-center justify-center text-error">
                <span class="material-symbols-outlined">error</span>
            </div>
            <div>
                <h5 class="font-bold text-on-surface">Acesso Negado</h5>
                <p class="text-sm text-on-surface-variant" id="toast-msg">E-mail ou senha incorretos.</p>
            </div>
        </div>
    </div>

    <!-- Firebase v11 e Lógica Híbrida -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let firebaseConfig = {
  apiKey: "AIzaSyBIF7sEasl6kIWZua-BO3e_sr3E3jCp6aE",
  authDomain: "monitora-yvypoty.firebaseapp.com",
  projectId: "monitora-yvypoty",
  storageBucket: "monitora-yvypoty.firebasestorage.app",
  messagingSenderId: "778447943661",
  appId: "1:778447943661:web:a128b7f140bcd9629919e4"
        };

        const isPreview = typeof __firebase_config !== 'undefined';
        if (isPreview) {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        if (isPreview) {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
        }

        function redirecionarPorPerfil(email) {
            if (isPreview) return; // Se estiver em teste, não tenta redirecionar e evita o erro

            const emailMin = email.toLowerCase();
            if (emailMin.includes('zelador')) {
                window.location.href = 'zelador.html';
            } else if (emailMin.includes('cozinha')) {
                window.location.href = 'cozinha.html';
            } else {
                window.location.href = 'admin.html';
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user && user.email) {
                redirecionarPorPerfil(user.email);
            }
        });

        window.handleLogin = function() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            const btn = document.getElementById('btn-entrar');

            if (!email || !pass) {
                mostrarErro("Preencha o e-mail e a senha.");
                return;
            }

            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Autenticando...`;
            btn.classList.add('opacity-80', 'pointer-events-none');

            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    if (isPreview) btn.innerHTML = `Entrou (Modo Preview)`;
                })
                .catch(() => {
                    btn.innerHTML = `Entrar no Sistema`;
                    btn.classList.remove('opacity-80', 'pointer-events-none');
                    mostrarErro("E-mail ou senha incorretos.");
                });
        }

        function mostrarErro(mensagem) {
            const toast = document.getElementById('toast-container');
            document.getElementById('toast-msg').innerText = mensagem;
            toast.classList.remove('-translate-y-[150%]');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('-translate-y-[150%]');
            }, 4000);
        }
    </script>
</body>
</html>
