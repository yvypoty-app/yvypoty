<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Yvy Poty | Painel Administrativo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@400..800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#464554", "surface-container-lowest": "#060e20", "on-surface-variant": "#c7c4d7",
                        "tertiary": "#ffb95f", "text-main": "#f8fafc", "on-surface": "#dae2fd",
                        "surface-bright": "#2d3449", "primary-container": "#8083ff", "secondary": "#4edea3", 
                        "background": "#0b1326", "surface": "#1e293b", "danger": "#ef4444", "surface-container-high": "#222a3d",
                        "surface-container-low": "#131b2e", "primary": "#c0c1ff"
                    },
                    fontFamily: { "body-lg": ["DM Sans"], "headline-sm": ["Syne"], "display-md": ["Syne"], "label-sm": ["DM Sans"] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b1326; color: #dae2fd; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-indigo { box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); }
        .glow-amber { box-shadow: 0 0 30px rgba(255, 185, 95, 0.15); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .modal-overlay { background: rgba(6, 14, 32, 0.85); backdrop-filter: blur(40px); }
        #app-content { display: none; opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="loading-screen" class="fixed inset-0 z-[200] bg-surface-container-lowest flex flex-col items-center justify-center">
        <span class="material-symbols-outlined text-6xl text-primary animate-spin mb-4">refresh</span>
        <h2 class="font-display-md text-xl text-primary">A verificar credenciais...</h2>
    </div>

    <div id="app-content" class="flex-col min-h-screen">
        <nav class="fixed top-0 w-full z-50 bg-surface-container/70 backdrop-blur-xl border-b border-white/10 shadow-sm flex justify-between items-center px-10 py-4 h-[72px]">
            <div class="flex items-center gap-8">
                <h1 class="font-headline-lg text-2xl font-bold text-primary">Yvy Poty</h1>
            </div>
            <div class="flex items-center gap-4">
                <button class="material-symbols-outlined text-on-surface-variant hover:bg-white/5 p-2 rounded-full transition-colors" onclick="window.fazerLogout()" title="Sair">logout</button>
            </div>
        </nav>

        <div class="flex pt-[72px] flex-1 overflow-hidden h-screen">
            <aside class="w-72 bg-surface-container-low border-r border-outline-variant p-6 hidden md:flex flex-col gap-6 overflow-y-auto custom-scrollbar pb-20">
                <div class="flex flex-col gap-2">
                    <span class="font-bold text-sm text-tertiary uppercase tracking-widest">Controle Acadêmico</span>
                    <h2 class="font-headline-sm text-xl text-on-surface">Filtro de Turmas</h2>
                </div>
                
                <div class="flex flex-col gap-3" id="filters-container">
                    <button class="filter-btn group flex items-center justify-between p-4 rounded-2xl bg-surface-bright/30 border border-white/5 glow-amber transition-all active:scale-95" data-turma="todos">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-tertiary">groups</span>
                            <span class="font-bold text-tertiary text-sm">Todas as Turmas</span>
                        </div>
                    </button>
                    <button class="filter-btn group flex items-center justify-between p-4 rounded-2xl bg-transparent border border-white/5 hover:bg-white/5 transition-all active:scale-95" data-turma="1º A">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-on-surface-variant">school</span>
                            <span class="font-bold text-on-surface-variant text-sm">Turma 1º Ano A</span>
                        </div>
                    </button>
                    <button class="filter-btn group flex items-center justify-between p-4 rounded-2xl bg-transparent border border-white/5 hover:bg-white/5 transition-all active:scale-95" data-turma="1º B">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-on-surface-variant">school</span>
                            <span class="font-bold text-on-surface-variant text-sm">Turma 1º Ano B</span>
                        </div>
                    </button>
                    <button class="filter-btn group flex items-center justify-between p-4 rounded-2xl bg-transparent border border-white/5 hover:bg-white/5 transition-all active:scale-95" data-turma="2º A">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-on-surface-variant">school</span>
                            <span class="font-bold text-on-surface-variant text-sm">Turma 2º Ano A</span>
                        </div>
                    </button>
                    <button class="filter-btn group flex items-center justify-between p-4 rounded-2xl bg-transparent border border-white/5 hover:bg-white/5 transition-all active:scale-95" data-turma="3º A">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-on-surface-variant">school</span>
                            <span class="font-bold text-on-surface-variant text-sm">Turma 3º Ano A</span>
                        </div>
                    </button>
                </div>
            </aside>

            <main class="flex-1 p-10 overflow-y-auto custom-scrollbar pb-32">
                <header class="mb-10 flex flex-col justify-between gap-6">
                    <div>
                        <h2 class="font-display-md text-3xl text-on-surface mb-2">Histórico de Movimentação</h2>
                        <p class="text-sm text-on-surface-variant max-w-2xl">Acompanhe em tempo real as entradas e saídas registradas na escola.</p>
                    </div>
                </header>

                <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl">
                    <div class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <span class="material-symbols-outlined text-primary">analytics</span>
                            <h3 class="font-headline-sm text-xl" id="titulo-tabela">Log de Acessos (Geral)</h3>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-surface-container-high/50 border-b border-white/10">
                                    <th class="px-6 py-4 font-bold text-sm text-on-surface-variant uppercase">Aluno</th>
                                    <th class="px-6 py-4 font-bold text-sm text-on-surface-variant uppercase">Turma</th>
                                    <th class="px-6 py-4 font-bold text-sm text-on-surface-variant uppercase">Evento</th>
                                    <th class="px-6 py-4 font-bold text-sm text-on-surface-variant uppercase">Horário</th>
                                    <th class="px-6 py-4 font-bold text-sm text-on-surface-variant uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-historico">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

        <div class="fixed bottom-10 right-10 z-40 bg-gradient-to-br from-primary-container to-primary p-6 rounded-3xl glow-indigo text-white min-w-[240px] shadow-[0_20px_50px_rgba(99,102,241,0.3)] transition-all hover:scale-105 cursor-pointer">
            <div class="flex items-center justify-between mb-4">
                <div class="p-2 bg-white/20 rounded-xl backdrop-blur-md"><span class="material-symbols-outlined">emoji_people</span></div>
                <span class="bg-black/20 px-2 py-1 rounded-lg text-xs font-bold uppercase tracking-wider">Ao Vivo</span>
            </div>
            <p class="font-bold text-sm opacity-80">Alunos no Campus</p>
            <div class="flex items-end gap-2 mt-1">
                <h4 class="font-display-md text-[48px] leading-tight font-extrabold tracking-tighter" id="counter-presentes">0</h4>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {
  apiKey: "AIzaSyBIF7sEasl6kIWZua-BO3e_sr3E3jCp6aE",
  authDomain: "monitora-yvypoty.firebaseapp.com",
  projectId: "monitora-yvypoty",
  storageBucket: "monitora-yvypoty.firebasestorage.app",
  messagingSenderId: "778447943661",
  appId: "1:778447943661:web:a128b7f140bcd9629919e4"
        };

        const isPreview = typeof __firebase_config !== 'undefined';
        if (isPreview) {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const databaseAlunos = {
            "2026001": { nome: "Ana Silva", turma: "1º A" },
            "2026002": { nome: "Bruno Costa", turma: "1º B" },
            "003": { nome: "Carlos Sousa", turma: "2º A" },
            "004": { nome: "Diana Lima", turma: "2º B" },
            "005": { nome: "Eduardo Gomes", turma: "3º A" }
        };

        let historicoGeral = [];
        let filtroAtual = 'todos';

        if (isPreview) {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                const appContent = document.getElementById('app-content');
                appContent.style.display = 'flex';
                setTimeout(() => { appContent.style.opacity = '1'; }, 100);
                iniciarLeituraFirebase(user);
            } else {
                if (!isPreview) {
                    window.location.href = 'index.html';
                }
            }
        });

        window.fazerLogout = function() {
            signOut(auth).then(() => { if (!isPreview) window.location.href = 'index.html'; });
        }

        function iniciarLeituraFirebase(user) {
            if (!user) return;

            let refRegistos = isPreview ? collection(db, 'artifacts', appId, 'public', 'data', 'registos_acesso') : collection(db, "registos_acesso");
            
            onSnapshot(refRegistos, (snapshot) => {
                historicoGeral = [];
                let presentesStatus = {};

                snapshot.forEach(doc => {
                    let data = doc.data();
                    historicoGeral.push(data);
                    if(data.tipo === 'entrada') presentesStatus[data.idAluno] = true;
                    if(data.tipo === 'saida') presentesStatus[data.idAluno] = false;
                });

                historicoGeral.sort((a, b) => b.hora.localeCompare(a.hora));
                document.getElementById('counter-presentes').innerText = Object.values(presentesStatus).filter(s => s === true).length;
                renderizarTabela();
            }, (error) => {
                console.error("Erro de permissão ou conexão:", error);
            });
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabela-historico');
            let logs = filtroAtual !== 'todos' ? historicoGeral.filter(l => (databaseAlunos[l.idAluno] || {}).turma === filtroAtual) : historicoGeral;

            if(logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-on-surface-variant font-body-lg">Nenhum registro encontrado.</td></tr>`;
                return;
            }

            tbody.innerHTML = logs.map(log => {
                let aluno = databaseAlunos[log.idAluno] || { nome: `ID Desconhecido (${log.idAluno})`, turma: "N/D" };
                let isEntrada = log.tipo === 'entrada';
                return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-colors group">
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-3">
                            <div class="h-10 w-10 rounded-full bg-surface-bright flex items-center justify-center border border-white/10"><span class="material-symbols-outlined text-primary">person</span></div>
                            <div><p class="font-bold text-on-surface">${aluno.nome}</p><p class="text-xs text-on-surface-variant">ID: #${log.idAluno}</p></div>
                        </div>
                    </td>
                    <td class="px-6 py-5 text-sm text-on-surface-variant">${aluno.turma}</td>
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-2 ${isEntrada ? 'text-secondary' : 'text-danger'}">
                            <span class="material-symbols-outlined text-[20px]">${isEntrada ? 'login' : 'logout'}</span>
                            <span class="font-bold text-sm">${isEntrada ? 'Entrada' : 'Saída'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-5 text-sm text-on-surface">${log.hora}</td>
                    <td class="px-6 py-5"><span class="px-3 py-1 rounded-full text-xs font-bold bg-secondary/15 text-secondary">Sincronizado</span></td>
                </tr>`;
            }).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const botaoClicado = e.currentTarget;
                filtroAtual = botaoClicado.getAttribute('data-turma');
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-surface-bright/30', 'glow-amber'); b.classList.add('bg-transparent');
                    b.querySelector('span:first-child').classList.replace('text-tertiary', 'text-on-surface-variant');
                    b.querySelector('span:last-child').classList.replace('text-tertiary', 'text-on-surface-variant');
                });
                botaoClicado.classList.add('bg-surface-bright/30', 'glow-amber'); botaoClicado.classList.remove('bg-transparent');
                botaoClicado.querySelector('span:first-child').classList.replace('text-on-surface-variant', 'text-tertiary');
                botaoClicado.querySelector('span:last-child').classList.replace('text-on-surface-variant', 'text-tertiary');
                document.getElementById('titulo-tabela').innerText = filtroAtual === 'todos' ? 'Log de Acessos (Geral)' : `Log de Acessos - Turma: ${filtroAtual}`;
                renderizarTabela();
            });
        });
    </script>
</body>
</html>
