        let modoAtual = 'entrada'; 
        let ultimoQRLido = '';
        let tempoUltimaLeitura = 0;

        window.setModo = function(modo) {
            modoAtual = modo;
            const btnEntrada = document.getElementById('btn-entrada');
            const btnSaida = document.getElementById('btn-saida');
            const scanLine = document.getElementById('scan-line-anim');
            const corners = [document.getElementById('corner-1'), document.getElementById('corner-2'), document.getElementById('corner-3'), document.getElementById('corner-4')];

            if (modo === 'entrada') {
                btnEntrada.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all bg-secondary text-black shadow-[inset_0_2px_5px_rgba(255,255,255,0.3)]";
                btnSaida.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all text-white hover:bg-surface-variant";
                scanLine.style.background = "linear-gradient(to right, transparent, #4edea3, transparent)";
                scanLine.style.boxShadow = "0 0 10px #4edea3";
                corners.forEach(c => { c.classList.replace('border-error', 'border-secondary'); });
            } else {
                btnSaida.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all bg-error text-black shadow-[inset_0_2px_5px_rgba(255,255,255,0.3)]";
                btnEntrada.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all text-white hover:bg-surface-variant";
                scanLine.style.background = "linear-gradient(to right, transparent, #ffb4ab, transparent)";
                scanLine.style.boxShadow = "0 0 10px #ffb4ab";
                corners.forEach(c => { c.classList.replace('border-secondary', 'border-error'); });
            }
        }

        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } 
            else { document.exitFullscreen(); }
        }

        function iniciarCamara() {
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: {width: 250, height: 250}, 
                aspectRatio: 1.0,
                videoConstraints: { facingMode: "environment" }
            }, false);
            html5QrcodeScanner.render(onScanSuccess, () => {});
        }

        function onScanSuccess(decodedText) {
            const agora = Date.now();
            // Trava de 4 segundos para evitar spam do mesmo QR Code
            if (decodedText === ultimoQRLido && (agora - tempoUltimaLeitura) < 4000) return;

            ultimoQRLido = decodedText;
            tempoUltimaLeitura = agora;

            // --- LÓGICA DE PISCAR A TELA ---
            const flash = document.getElementById('flash-overlay');
            // Cor do flash baseada no modo
            if(modoAtual === 'entrada') {
                flash.className = "absolute inset-0 z-20 pointer-events-none transition-opacity duration-200 bg-secondary/60 opacity-100";
            } else {
                flash.className = "absolute inset-0 z-20 pointer-events-none transition-opacity duration-200 bg-error/60 opacity-100";
            }
            
            // Remove o flash rápido
            setTimeout(() => {
                flash.classList.replace('opacity-100', 'opacity-0');
            }, 250);

            try { navigator.vibrate([200, 100, 200]); } catch(e){}
            enviarParaFirebase(decodedText, modoAtual);
        }

        function enviarParaFirebase(idLido, tipoOperacao) {
            let horaFormatada = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            let dataFormatada = new Date().toLocaleDateString('pt-BR');
            
            let refRegistos = isPreview ? collection(db, 'artifacts', appId, 'public', 'data', 'registos_acesso') : collection(db, "registos_acesso");

            addDoc(refRegistos, {
                idAluno: idLido, 
                tipo: tipoOperacao, 
                hora: horaFormatada, 
                data: dataFormatada, 
                notificado: false 
            }).then(() => {
                mostrarAlerta(`QR Lido: ${tipoOperacao.toUpperCase()}`);
                adicionarAoLog3D(idLido, tipoOperacao, horaFormatada);
            }).catch((error) => {
                console.error(error);
                mostrarAlerta("Erro de Conexão!", true);
            });
        }

        function adicionarAoLog3D(id, tipo, hora) {
            const lista = document.getElementById('log-list');
            const empty = document.getElementById('empty-log');
            if(empty) empty.remove();

            // Puxa o nome do aluno da lista baseada no ID, se não achar mostra apenas o ID
            let nomeAluno = databaseAlunos[id] ? databaseAlunos[id].nome : `Desconhecido`;
            const idCurto = id.length > 15 ? id.substring(0, 15) + '...' : id; // caso leia lixo

            const isEntrada = tipo === 'entrada';
            const li = document.createElement('li');
            li.className = `card-3d rounded-xl p-3 flex justify-between items-center border-l-4 ${isEntrada ? 'border-[#4edea3]' : 'border-[#ffb4ab]'}`;
            
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center shadow-inner shrink-0">
                        <span class="material-symbols-outlined ${isEntrada ? 'text-secondary' : 'text-error'}">${isEntrada ? 'login' : 'logout'}</span>
                    </div>
                    <div class="overflow-hidden">
                        <p class="font-bold text-white text-sm uppercase truncate">${nomeAluno}</p>
                        <p class="text-xs text-gray-400 font-medium">ID: ${idCurto} • ${tipo.toUpperCase()}</p>
                    </div>
                </div>
                <div class="text-right shrink-0 ml-2">
                    <p class="text-lg font-stat-value text-primary">${hora}</p>
                    <p class="text-[10px] text-secondary flex items-center gap-1 justify-end"><span class="material-symbols-outlined text-[12px]">cloud_done</span></p>
                </div>
            `;
            lista.prepend(li);
        }

        function mostrarAlerta(msg, isError=false) {
            const alerta = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            
            if (isError) {
                alerta.style.background = '#ef4444'; alerta.style.boxShadow = '0 10px 25px rgba(239,68,68,0.5)';
            } else if(modoAtual === 'entrada') {
                alerta.style.background = '#00a572'; alerta.style.boxShadow = '0 10px 25px rgba(0,165,114,0.5)';
            } else {
                alerta.style.background = '#ea580c'; alerta.style.boxShadow = '0 10px 25px rgba(234,88,12,0.5)';
            }
            alerta.classList.add('show');
            setTimeout(() => alerta.classList.remove('show'), 2500);
        }
