<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta name="theme-color" content="#0b1326">
    <title>Yvy Poty - Portaria Automática</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#31394d", "primary-container": "#4f46e5", "background": "#0b1326",
                        "surface-container-highest": "#2d3449", "outline-variant": "#464555", "surface-container-low": "#131b2e",
                        "secondary": "#4edea3", "primary": "#c3c0ff", "surface-container": "#171f33", "error": "#ffb4ab", "surface-container-lowest": "#060e20"
                    },
                    "fontFamily": { "body-lg": ["Inter"], "headline-md": ["Inter"], "stat-value": ["Geist"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { min-height: 100dvh; }
        #reader { border: none !important; border-radius: 12px; overflow: hidden; background: #000; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; border-radius: 12px; }
        #reader__dashboard_section_csr span { color: #c3c0ff !important; }
        #reader button { background: #4f46e5; color: white; padding: 10px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .box-3d { background: linear-gradient(145deg, #151e33, #111829); box-shadow: inset 5px 5px 15px rgba(0,0,0,0.6), inset -5px -5px 15px rgba(255,255,255,0.05), 0 10px 20px rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.1); }
        .card-3d { background: #171f33; box-shadow: 4px 4px 10px rgba(0,0,0,0.4), -2px -2px 8px rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); transform: translateZ(0); transition: all 0.3s ease; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #464555; border-radius: 10px; }
        .scan-line { height: 2px; width: 100%; background: linear-gradient(to right, transparent, #4edea3, transparent); position: absolute; animation: scan-line 2s linear infinite; z-index: 10; box-shadow: 0 0 10px #4edea3; }
        @keyframes scan-line { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .toast-3d { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-150px); background: #00a572; color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,165,114,0.5), inset 0 2px 5px rgba(255,255,255,0.3); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 100; display: flex; align-items: center; gap: 8px; }
        .toast-3d.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-background text-white font-body-lg min-h-screen flex flex-col overflow-hidden">

    <!-- Tela de Carregamento Seguro -->
    <div id="loading-screen" class="fixed inset-0 z-[200] bg-surface-container-lowest flex flex-col items-center justify-center">
        <span class="material-symbols-outlined text-6xl text-primary animate-spin mb-4" style="font-family: 'Material Symbols Outlined'">refresh</span>
        <h2 class="font-bold text-xl text-primary">A verificar credenciais...</h2>
    </div>

    <div id="app-content" class="flex-col min-h-screen hidden opacity-0 transition-opacity duration-500">
        <header class="fixed top-0 left-0 w-full z-50 bg-background border-b border-outline-variant flex items-center justify-between px-4 h-16 shadow-none">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">qr_code_scanner</span>
                <h1 class="font-headline-md font-bold text-primary tracking-wide">Yvy Poty <span class="text-xs text-on-surface-variant font-normal uppercase">Zelador</span></h1>
            </div>
            <div class="flex gap-2">
                <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors" onclick="window.toggleFullscreen()">
                    <span class="material-symbols-outlined text-gray-400">fullscreen</span>
                </button>
                <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-red-500/20 transition-colors" onclick="window.fazerLogout()" title="Sair">
                    <span class="material-symbols-outlined text-red-400">logout</span>
                </button>
            </div>
        </header>

        <div id="toast" class="toast-3d">
            <span class="material-symbols-outlined" id="toast-icon">check_circle</span>
            <span id="toast-msg">Leitura Registrada!</span>
        </div>

        <main class="flex-1 mt-16 p-4 flex flex-col gap-5 overflow-y-auto custom-scrollbar pb-6">
            <div class="bg-surface-container-high p-1 rounded-xl flex gap-1 shadow-lg border border-outline-variant/30 shrink-0">
                <button id="btn-entrada" onclick="window.setModo('entrada')" class="flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all bg-secondary text-black shadow-[inset_0_2px_5px_rgba(255,255,255,0.3)]">
                    <span class="material-symbols-outlined">login</span> ENTRADA
                </button>
                <button id="btn-saida" onclick="window.setModo('saida')" class="flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all text-white hover:bg-surface-variant">
                    <span class="material-symbols-outlined">logout</span> SAÍDA
                </button>
            </div>

            <section class="relative w-full max-w-sm mx-auto aspect-square overflow-hidden rounded-2xl border-2 border-outline-variant bg-surface-container-lowest shadow-[0_10px_30px_rgba(0,0,0,0.5)] shrink-0">
                <div class="w-full h-full" id="reader"></div>
                <div class="absolute inset-0 pointer-events-none z-10 flex items-center justify-center">
                    <div class="w-4/5 h-4/5 relative">
                        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-secondary rounded-tl-lg" id="corner-1"></div>
                        <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-secondary rounded-tr-lg" id="corner-2"></div>
                        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-secondary rounded-bl-lg" id="corner-3"></div>
                        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-secondary rounded-br-lg" id="corner-4"></div>
                        <div class="scan-line" id="scan-line-anim"></div>
                    </div>
                </div>
            </section>

            <div class="box-3d rounded-2xl p-4 flex flex-col flex-1 min-h-[200px]">
                <h3 class="text-sm font-bold text-primary mb-3 uppercase tracking-wider flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">history</span> Últimos Registros
                </h3>
                <ul id="log-list" class="space-y-3 flex-1 overflow-y-auto custom-scrollbar pr-1">
                    <li class="text-center text-gray-400 text-sm mt-4 italic opacity-50" id="empty-log">Aguardando leituras...</li>
                </ul>
            </div>
        </main>
    </div>

    <!-- Firebase v11 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {
  apiKey: "AIzaSyBIF7sEasl6kIWZua-BO3e_sr3E3jCp6aE",
  authDomain: "monitora-yvypoty.firebaseapp.com",
  projectId: "monitora-yvypoty",
  storageBucket: "monitora-yvypoty.firebasestorage.app",
  messagingSenderId: "778447943661",
  appId: "1:778447943661:web:a128b7f140bcd9629919e4"
        };

        const isPreview = typeof __firebase_config !== 'undefined';
        if (isPreview) { try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {} }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        if (isPreview) {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
        }

        onAuthStateChanged(auth, (user) => {
            if (user || isPreview) {
                document.getElementById('loading-screen').style.display = 'none';
                const appContent = document.getElementById('app-content');
                appContent.style.display = 'flex';
                setTimeout(() => { appContent.style.opacity = '1'; }, 100);
                iniciarCamara();
            } else {
                window.location.href = 'index.html';
            }
        });

        window.fazerLogout = function() {
            signOut(auth).then(() => { if (!isPreview) window.location.href = 'index.html'; });
        }

        let modoAtual = 'entrada'; 
        let ultimoQRLido = '';
        let tempoUltimaLeitura = 0;

        window.setModo = function(modo) {
            modoAtual = modo;
            const btnEntrada = document.getElementById('btn-entrada');
            const btnSaida = document.getElementById('btn-saida');
            const scanLine = document.getElementById('scan-line-anim');
            const corners = [document.getElementById('corner-1'), document.getElementById('corner-2'), document.getElementById('corner-3'), document.getElementById('corner-4')];

            if (modo === 'entrada') {
                btnEntrada.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all bg-secondary text-black shadow-[inset_0_2px_5px_rgba(255,255,255,0.3)]";
                btnSaida.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all text-white hover:bg-surface-variant";
                scanLine.style.background = "linear-gradient(to right, transparent, #4edea3, transparent)";
                scanLine.style.boxShadow = "0 0 10px #4edea3";
                corners.forEach(c => { c.classList.replace('border-error', 'border-secondary'); });
            } else {
                btnSaida.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all bg-error text-black shadow-[inset_0_2px_5px_rgba(255,255,255,0.3)]";
                btnEntrada.className = "flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all text-white hover:bg-surface-variant";
                scanLine.style.background = "linear-gradient(to right, transparent, #ffb4ab, transparent)";
                scanLine.style.boxShadow = "0 0 10px #ffb4ab";
                corners.forEach(c => { c.classList.replace('border-secondary', 'border-error'); });
            }
        }

        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } 
            else { document.exitFullscreen(); }
        }

        function iniciarCamara() {
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: {width: 250, height: 250}, 
                aspectRatio: 1.0,
                videoConstraints: { facingMode: "environment" } // Força a abertura da Câmera Traseira
            }, false);
            html5QrcodeScanner.render(onScanSuccess, () => {});
        }

        function onScanSuccess(decodedText) {
            const agora = Date.now();
            if (decodedText === ultimoQRLido && (agora - tempoUltimaLeitura) < 4000) return;

            ultimoQRLido = decodedText;
            tempoUltimaLeitura = agora;

            try { navigator.vibrate([200, 100, 200]); } catch(e){}
            enviarParaFirebase(decodedText, modoAtual);
        }

        function enviarParaFirebase(idLido, tipoOperacao) {
            let horaFormatada = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            let dataFormatada = new Date().toLocaleDateString('pt-BR'); // Salva a data atual (necessário para as faltas)
            
            // Corrige o destino dependendo se é preview ou github pages
            let refRegistos = isPreview ? collection(db, 'artifacts', appId, 'public', 'data', 'registos_acesso') : collection(db, "registos_acesso");

            addDoc(refRegistos, {
                idAluno: idLido, 
                tipo: tipoOperacao, 
                hora: horaFormatada, 
                data: dataFormatada, // Campo data adicionado
                notificado: false 
            }).then(() => {
                mostrarAlerta(`QR Lido: ${tipoOperacao.toUpperCase()}`);
                adicionarAoLog3D(idLido, tipoOperacao, horaFormatada);
            }).catch((error) => {
                console.error(error);
                mostrarAlerta("Erro de Conexão!", true);
            });
        }

        function adicionarAoLog3D(id, tipo, hora) {
            const lista = document.getElementById('log-list');
            const empty = document.getElementById('empty-log');
            if(empty) empty.remove();

            const isEntrada = tipo === 'entrada';
            const li = document.createElement('li');
            li.className = `card-3d rounded-xl p-3 flex justify-between items-center border-l-4 ${isEntrada ? 'border-[#4edea3]' : 'border-[#ffb4ab]'}`;
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center shadow-inner">
                        <span class="material-symbols-outlined ${isEntrada ? 'text-secondary' : 'text-error'}">${isEntrada ? 'login' : 'logout'}</span>
                    </div>
                    <div>
                        <p class="font-bold text-white text-sm uppercase">ID: ${id}</p>
                        <p class="text-xs text-gray-400 font-medium">${tipo.toUpperCase()}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-lg font-stat-value text-primary">${hora}</p>
                    <p class="text-[10px] text-secondary flex items-center gap-1 justify-end"><span class="material-symbols-outlined text-[12px]">cloud_done</span> Nuvem</p>
                </div>
            `;
            lista.prepend(li);
        }

        function mostrarAlerta(msg, isError=false) {
            const alerta = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            
            if (isError) {
                alerta.style.background = '#ef4444'; alerta.style.boxShadow = '0 10px 25px rgba(239,68,68,0.5)';
            } else if(modoAtual === 'entrada') {
                alerta.style.background = '#00a572'; alerta.style.boxShadow = '0 10px 25px rgba(0,165,114,0.5)';
            } else {
                alerta.style.background = '#ea580c'; alerta.style.boxShadow = '0 10px 25px rgba(234,88,12,0.5)';
            }
            alerta.classList.add('show');
            setTimeout(() => alerta.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
